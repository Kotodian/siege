name: Build Tauri Desktop App

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg

      - name: Generate macOS icons
        if: runner.os == 'macOS'
        run: |
          cd src-tauri/icons
          mkdir -p icon.iconset
          sips -z 16 16 128x128.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 128x128.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 128x128.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 128x128.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 128x128.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 128x128@2x.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 128x128@2x.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 128x128@2x.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 128x128@2x.png --out icon.iconset/icon_512x512.png
          cp 128x128@2x.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      - name: Install npm dependencies
        run: npm ci

      - name: Build static frontend
        run: npm run build:static

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: siege-${{ matrix.target }}
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore
